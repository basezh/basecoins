<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>basecoin.best</title>
<meta name="description" content="Trending tokens on Base"/>
<meta property="og:title" content="basecoin.best"/>
<meta property="og:description" content="Trending tokens on Base"/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="https://basecoin.best/"/>
<meta property="og:image" content="https://basecoin.best/images/thumbnail.png"/>
<meta property="og:image:type" content="image/png"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="basecoin.best"/>
<meta name="twitter:description" content="Trending tokens on Base"/>
<meta name="twitter:image" content="https://basecoin.best/images/thumbnail.png"/>
<link rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🟦</text></svg>">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<style>
  :root{
    --blue:#0000ff;
    --green:#66c800;
    --red:#fc401f;

    --bg:#0a0b0d;
    --panel:#0f1115;
    --panel-accent:#121419;
    --border:#1d2026;

    --text:#e9edf2;
    --text-weak:#cfd6de;
    --muted:#aeb6c2;

    --btn-bg:#121419;
    --btn-br:#2a2f38;
    --btn-hover:#171c23;
    --btn-active:#0a0b0d;

    --focus:#0000ff;
    --logo-color:#ffffff;
    --footer-link:#8B919E;
    --footer-link-hover:#ffffff;

    --page-side-padding:35px;
    --page-top-padding:20px;
    --footer-bottom-gap:18px;
    --panel-footer-gap:18px;

    --thead-padding:10px;
    --row-padding:11px;
    --table-gap:5px;
    --logo-size:40px;

    --table-min-width:980px;

    --scroll-size:10px;
    --scroll-radius:999px;
    --scroll-track:transparent;
    --scroll-thumb:rgba(255,255,255,.16);
    --scroll-thumb-hover:rgba(255,255,255,.28);
  }

  .theme-light{
    --bg:#ffffff;
    --panel:#f7f9fb;
    --panel-accent:#eef2f7;
    --border:#e4e9f1;

    --text:#12203a;
    --text-weak:#2a3b57;
    --muted:#5a6e93;

    --btn-bg:#f3f6fb;
    --btn-br:#dfe7f3;
    --btn-hover:#e9eef7;
    --btn-active:#e0e6f2;

    --focus:#0000ff;
    --logo-color:#0000ff;

    --footer-link:#727887;
    --footer-link-hover:#0000ff;

    --scroll-track:transparent;
    --scroll-thumb:rgba(49,66,95,.22);
    --scroll-thumb-hover:rgba(49,66,95,.38);
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:"Poppins",system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  .wrap{
    max-width:1200px;
    min-height:100vh;
    margin:0 auto;
    padding:var(--page-top-padding) var(--page-side-padding) var(--footer-bottom-gap);
  }

  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    margin-bottom:20px;
  }

  .title{
    display:flex;
    align-items:center;
    gap:14px;
    min-width:0;
    flex:1;
  }

  .base-logo{
    display:inline-flex;
    align-items:center;
    color:var(--logo-color);
    flex:0 0 auto;
  }

  .base-logo svg{
    height:22px;
    width:auto;
    display:block;
  }

  .hdr-site-logo .hdr-logo-word{fill:var(--text)}
  .hdr-site-logo .hdr-logo-mark{fill:var(--text)}
  .theme-light .hdr-site-logo .hdr-logo-word{fill:#000000}
  .theme-light .hdr-site-logo .hdr-logo-mark{fill:#0000FF}

  .title-text{
    font-size:26px;
    font-weight:700;
    letter-spacing:.2px;
    transform:translateY(1.5px);
  }
  .theme-light .title-text{
    background:linear-gradient(115deg,#2a2a2a 0%,#4d4d4d 42%,#383838 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .theme-toggle{
    display:inline-flex;
    align-items:center;
    flex:0 0 auto;
  }

  .switch{
    position:relative;
    width:44px;
    height:24px;
    border-radius:999px;
    background:var(--btn-bg);
    border:1px solid var(--btn-br);
    cursor:pointer;
    transition:background .15s,border-color .15s;
  }
  .switch:hover{background:var(--btn-hover)}

  .knob{
    position:absolute;
    top:2px;
    left:2px;
    width:20px;
    height:20px;
    border-radius:50%;
    background:#fff;
    transition:left .18s,background .15s;
    box-shadow:0 1px 2px rgba(0,0,0,.15);
  }

  .switch[aria-checked="true"] .knob{left:22px}

  .topbar{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }

  .chips{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  .chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:6px 14px;
    min-height:40px;
    border-radius:10px;
    border:1.5px solid transparent;
    background:var(--btn-bg);
    color:var(--muted);
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    transition:all .2s;
    user-select:none;
    white-space:nowrap;
  }
  .chip:hover{background:var(--btn-hover)}
  .chip.active{
    background:var(--bg);
    border-color:#3b63ff;
    color:var(--text);
  }

  button.chip{
    font:inherit;
    margin:0;
    -webkit-appearance:none;
    appearance:none;
  }

  .topbar-right{
    display:flex;
    align-items:flex-start;
    gap:8px;
    flex-wrap:wrap;
    flex:0 0 auto;
  }

  #viewToggle{
    box-sizing:border-box;
    min-width:76px;
    justify-content:center;
  }

  .chip-icon{
    width:16px;
    height:16px;
    border-radius:5px;
    object-fit:cover;
    display:none;
    flex:0 0 auto;
  }

  .chip-label{
    display:inline-block;
    line-height:1;
  }

  .cycle-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:58px;
    min-height:40px;
    padding:6px 14px;
    border-radius:10px;
    border:1.5px solid #3b63ff;
    background:var(--bg);
    color:var(--text);
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:all .2s;
    user-select:none;
    white-space:nowrap;
  }
  .cycle-btn:hover{background:var(--btn-hover)}

  .content{margin-top:12px}

  .panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    min-height:260px;
    height:var(--panel-height,60vh);
    margin-bottom:var(--panel-footer-gap);
  }

  .panel-view{
    flex:1;
    display:flex;
    flex-direction:column;
    min-height:0;
  }
  .panel-view[hidden]{
    display:none !important;
  }

  .table-scroll{
    flex:1 1 auto;
    min-height:0;
    overflow:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:thin;
    scrollbar-color:var(--scroll-thumb) var(--scroll-track);
  }

  .table-inner{
    min-width:var(--table-min-width);
    width:100%;
    min-height:100%;
    display:flex;
    flex-direction:column;
  }

  .thead,.row{
    display:grid;
    align-items:center;
    gap:var(--table-gap);
  }

  .thead.desktop,
  .row.desktop{
    grid-template-columns:
      68px
      minmax(150px,1.5fr)
      minmax(120px,1fr)
      minmax(95px,.8fr)
      minmax(100px,.8fr)
      minmax(100px,.8fr)
      minmax(72px,.55fr);
  }

  .thead.mobile,
  .row.mobile{
    grid-template-columns:
      30px
      minmax(120px,1fr)
      minmax(70px,.6fr)
      minmax(70px,.6fr)
      minmax(70px,.6fr)
      minmax(50px,.44fr);
  }

  .thead{
    padding:var(--thead-padding);
    background:var(--panel-accent);
    color:var(--text-weak);
    font-weight:600;
    position:sticky;
    top:0;
    z-index:5;
    border-bottom:1px solid var(--border);
    flex:0 0 auto;
  }

  .rows{
    flex:1 1 auto;
    min-height:0;
    overflow:visible;
  }

  .row{
    padding:var(--row-padding);
    border-top:1px solid var(--border);
  }
  .row:hover{background:rgba(0,0,0,.04)}

  .rank{
    font-weight:600;
    font-size:14px;
    white-space:nowrap;
  }

  .token{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
  }

  .logo{
    width:var(--logo-size);
    height:var(--logo-size);
    border-radius:10px;
    object-fit:cover;
    border:1px solid var(--border);
    flex:0 0 auto;
  }

  .tinfo{min-width:0;flex:1}

  .symbol-line{
    display:flex;
    align-items:center;
    gap:8px;
    min-width:0;
  }

  .symbol{
    font-weight:600;
    font-size:15px;
    color:#3b63ff;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    min-width:0;
  }

  .cat-icon{
    width:18px;
    height:18px;
    border-radius:6px;
    object-fit:cover;
    border:1px solid var(--border);
    flex:0 0 auto;
  }

  .subline{margin-top:1px}

  .name-line{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    color:var(--muted);
    min-width:0;
    line-height:1.15;
  }

  .name{
    flex:0 1 auto;
    min-width:0;
    display:inline-block;
    max-width:100%;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .ca-btn{
    font-size:10px;
    padding:0 6px;
    line-height:1.4;
    border-radius:5px;
    border:1px solid var(--btn-br);
    height:20px;
    background:var(--btn-bg);
    color:#3b63ff;
    cursor:pointer;
    transition:background .15s,color .15s,border-color .15s,transform .08s;
    flex:0 0 auto;
  }
  .ca-btn:hover{background:var(--btn-hover)}
  .ca-btn:active,.ca-btn.copied{background:var(--btn-active);border-color:var(--blue);color:var(--blue)}

  .price,
  .change,
  .age,
  .volume,
  .fdv{
    font-size:14px;
    font-weight:500;
    white-space:nowrap;
  }

  .change.positive{color:var(--green)}
  .change.negative{color:var(--red)}

  .price-change{
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:2px;
    min-width:0;
    line-height:1.15;
  }

  .price-line,
  .change-line{
    font-size:14px;
    font-weight:500;
    white-space:nowrap;
  }

  .change-line.positive{color:var(--green)}
  .change-line.negative{color:var(--red)}

  .th-sort{
    cursor:pointer;
    user-select:none;
  }

  a.link{text-decoration:none;font-weight:600}
  a.link:hover{text-decoration:underline}

  .treemap-wrap{
    flex:1;
    min-height:0;
    position:relative;
    padding:4px;
  }
  .treemap-canvas{
    position:absolute;
    inset:4px;
  }
  .treemap-cell.treemap-cell--tight{
    padding:5px 6px;
  }
  .tm-stack--tight{
    gap:0.12em;
  }
  .treemap-cell{
    position:absolute;
    overflow:hidden;
    border-radius:6px;
    border:1px solid rgba(0,0,0,.35);
    text-decoration:none;
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    box-sizing:border-box;
    padding:8px;
    text-align:center;
    text-shadow:0 1px 3px rgba(0,0,0,.85);
    transition:filter .12s, box-shadow .12s;
  }
  .theme-light .treemap-cell{
    border-color:rgba(0,0,0,.12);
    text-shadow:0 1px 2px rgba(0,0,0,.55);
  }
  .treemap-cell:hover{
    filter:brightness(1.07);
    z-index:5;
    box-shadow:0 0 0 2px rgba(59,99,255,.55);
  }
  .treemap-cell.treemap-other{
    cursor:default;
  }
  .treemap-cell.treemap-other:hover{
    filter:none;
    box-shadow:none;
  }
  .tm-stack{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:0.28em;
    max-width:100%;
    min-width:0;
    width:100%;
  }
  .tm-toprow{
    display:flex;
    flex-direction:row;
    align-items:center;
    justify-content:center;
    gap:max(4px,0.35em);
    max-width:100%;
    min-width:0;
  }
  .tm-toprow--solo .tm-textcol{
    align-items:center;
    text-align:center;
  }
  .tm-toprow--stack{
    flex-direction:column;
    gap:max(3px,0.22em);
  }
  .tm-toprow--stack .tm-textcol{
    align-items:center;
    text-align:center;
    flex:0 1 auto;
    width:100%;
  }
  .tm-logo-side{
    border-radius:22%;
    object-fit:cover;
    border:1px solid rgba(255,255,255,.3);
    flex-shrink:0;
  }
  .tm-textcol{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    justify-content:center;
    gap:0.08em;
    min-width:0;
    flex:1 1 auto;
    max-width:100%;
    text-align:left;
  }
  .tm-name-side{
    font-weight:500;
    line-height:1.18;
    opacity:.95;
    width:100%;
    max-width:100%;
    min-width:0;
    white-space:nowrap;
    overflow:visible;
  }
  .tm-ticker-side{
    font-weight:700;
    line-height:1.12;
    width:100%;
    max-width:100%;
    min-width:0;
    white-space:nowrap;
    overflow:visible;
  }
  .tm-pricechg{
    display:flex;
    flex-direction:row;
    flex-wrap:nowrap;
    align-items:center;
    justify-content:center;
    align-content:center;
    gap:0.3em 0.45em;
    font-weight:600;
    line-height:1.22;
    max-width:100%;
    min-width:0;
    width:100%;
  }
  .tm-pricechg--stack{
    flex-direction:column;
    gap:0.12em 0;
  }
  .tm-pricechg--stack .tm-price-line,
  .tm-pricechg--stack .tm-chg-line{
    width:100%;
    flex:0 0 auto;
  }
  .tm-price-line,
  .tm-chg-line{
    flex:0 0 auto;
    max-width:none;
    min-width:0;
    text-align:center;
    white-space:nowrap;
  }
  .tm-subwrap{
    display:flex;
    flex-direction:row;
    flex-wrap:nowrap;
    align-items:center;
    justify-content:center;
    align-content:center;
    gap:0.2em 0.45em;
    max-width:100%;
    min-width:0;
    width:100%;
    margin-top:0.08em;
    opacity:.82;
    font-weight:500;
    line-height:1.22;
    text-align:center;
  }
  .tm-subwrap--stack{
    flex-direction:column;
    gap:0.08em 0;
  }
  .tm-subwrap--stack .tm-sub-line{
    width:100%;
    flex:0 0 auto;
  }
  .tm-sub-line{
    flex:0 0 auto;
    max-width:none;
    min-width:0;
    white-space:nowrap;
  }
  .tm-chg-up{color:#b8ff7a}
  .tm-chg-down{color:#ffb4a8}
  .tm-chg-flat{color:#e8e8ee}
  .treemap-status-msg{
    padding:24px;
    color:var(--muted);
    text-align:center;
    font-size:15px;
  }
  .treemap-status-msg.err{color:var(--red)}
  :focus-visible{outline:2px solid var(--focus);outline-offset:2px;border-radius:8px}

  .footer{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    color:var(--muted);
    line-height:1;
    min-height:24px;
  }

  .footer-brand{
    display:inline-flex;
    align-items:center;
    line-height:1;
    flex:0 0 auto;
  }
  .footer-brand svg{
    height:16px;
    width:auto;
    display:block;
  }

  .footer-links{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    font-size:14px;
    line-height:1;
  }
  .footer-links a{
    color:var(--footer-link);
    text-decoration:none;
    font-weight:500;
    transition:color .15s ease;
  }
  .footer-links a:hover{
    color:var(--footer-link-hover);
    text-decoration:underline;
  }
  .footer-sep{
    color:var(--footer-link);
    user-select:none;
  }

  .basezh-logo .logo-blue{fill:#0000FF}
  .basezh-logo .logo-black{fill:#000000}
  :root:not(.theme-light) .basezh-logo .logo-blue,
  :root:not(.theme-light) .basezh-logo .logo-black{
    fill:#8B919E;
  }

  /* ===== Minimal scrollbar ===== */
  .table-scroll,
  .topbar,
  body{
    scrollbar-width:thin;
    scrollbar-color:var(--scroll-thumb) var(--scroll-track);
  }

  .table-scroll::-webkit-scrollbar,
  .topbar::-webkit-scrollbar,
  body::-webkit-scrollbar{
    width:var(--scroll-size);
    height:var(--scroll-size);
  }

  .table-scroll::-webkit-scrollbar-track,
  .topbar::-webkit-scrollbar-track,
  body::-webkit-scrollbar-track{
    background:var(--scroll-track);
    border-radius:var(--scroll-radius);
  }

  .table-scroll::-webkit-scrollbar-thumb,
  .topbar::-webkit-scrollbar-thumb,
  body::-webkit-scrollbar-thumb{
    background:var(--scroll-thumb);
    border-radius:var(--scroll-radius);
    border:2px solid transparent;
    background-clip:padding-box;
  }

  .table-scroll::-webkit-scrollbar-thumb:hover,
  .topbar::-webkit-scrollbar-thumb:hover,
  body::-webkit-scrollbar-thumb:hover{
    background:var(--scroll-thumb-hover);
    border:2px solid transparent;
    background-clip:padding-box;
  }

  .table-scroll::-webkit-scrollbar-corner,
  .topbar::-webkit-scrollbar-corner,
  body::-webkit-scrollbar-corner{
    background:transparent;
  }

  @media (max-width:900px){
    :root{
      --table-min-width:980px;
      --logo-size:38px;
    }
  }

  @media (max-width:720px){
    :root{
      --page-side-padding:12px;
      --page-top-padding:12px;
      --footer-bottom-gap:10px;
      --panel-footer-gap:10px;

      --thead-padding:6px;
      --row-padding:7px;
      --table-gap:3px;
      --logo-size:34px;
      --table-min-width:600px;
      --scroll-size:6px;
    }

    html,body{
      height:100%;
      height:100dvh;
      overflow:hidden;
      overscroll-behavior-y:none;
    }

    .wrap{
      min-height:0;
      height:100%;
      max-height:100dvh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .header{
      flex-shrink:0;
      margin-bottom:10px;
      gap:10px;
      align-items:flex-start;
    }

    .title{gap:10px;align-items:center}
    .base-logo svg{height:17px}
    .title-text{
      font-size:20px;
      line-height:1.1;
    }

    .theme-toggle{margin-top:2px}
    .switch{width:40px;height:22px}
    .knob{width:18px;height:18px}
    .switch[aria-checked="true"] .knob{left:20px}

    .topbar{
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:8px;
      flex-wrap:nowrap;
      overflow-x:auto;
      overflow-y:hidden;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:thin;
      padding-bottom:2px;
    }

    #catChips{
      flex-wrap:nowrap;
      gap:5px;
      flex:1 1 auto;
      min-width:0;
    }

    #winChips{display:none}

    #catChips .chip{
      min-width:38px;
      width:38px;
      min-height:38px;
      padding:0;
      border-radius:11px;
      font-size:0;
      flex:0 0 auto;
    }
    #catChips .chip .chip-icon{
      display:block;
      width:20px;
      height:20px;
      border-radius:4px;
    }
    #catChips .chip[data-cat="all"]{
      width:auto;
      min-width:42px;
      padding:0 10px;
      font-size:11px;
    }
    #catChips .chip[data-cat="all"] .chip-icon{display:none}
    #catChips .chip:not([data-cat="all"]) .chip-label{display:none}

    #viewToggle{
      min-width:48px;
      min-height:38px;
      padding:0 10px;
      border-radius:11px;
      font-size:12px;
      font-weight:500;
    }

    #mobileWinCycle{
      display:inline-flex;
      min-width:48px;
      min-height:38px;
      padding:0 10px;
      border-radius:11px;
      font-size:12px;
      flex:0 0 auto;
      margin-left:auto;
    }

    .content{
      margin-top:6px;
      flex:1 1 auto;
      min-height:0;
      display:flex;
      flex-direction:column;
    }
    .panel{
      border-radius:12px;
      flex:1 1 auto;
      min-height:0;
      height:auto;
    }

    .logo{border-radius:6px}

    .thead.mobile{
      font-size:12px;
    }

    .rank{font-size:11px}
    .symbol{font-size:12px}
    .price-line,
    .change-line,
    .age,
    .volume,
    .fdv{font-size:12px}
    .name-line{font-size:10px}
    .cat-icon{width:14px;height:14px;border-radius:3.5px}
    .ca-btn{font-size:9px;height:18px;padding:0 3.5px}

    .price-change{
      gap:2px;
      line-height:1.15;
    }

    .footer{
      flex-shrink:0;
      gap:6px;
      text-align:center;
    }
    .footer-brand svg{height:13px}
    .footer-links{
      font-size:11px;
      gap:6px;
      justify-content:center;
    }
  }

  @media (min-width:721px){
    #mobileWinCycle{display:none}
  }

  @media (max-width:420px){

      --page-side-padding:10px;
      --page-top-padding:10px;
      --footer-bottom-gap:8px;
      --panel-footer-gap:8px;
      --logo-size:32px;
      --table-min-width:570px;
      --thead-padding:5px;
      --row-padding:6px;
      --table-gap:2px;
      --scroll-size:4px;

      height:18px;
    }

      min-width:40px;
      padding:0 9px;
    }

    #viewToggle{
      min-width:44px;
      min-height:36px;
      padding:0 9px;
      font-size:11px;
    }

    #mobileWinCycle{
      min-width:44px;
      min-height:36px;
      padding:0 9px;
      font-size:11px;
    }

    .thead.mobile{font-size:11px}

    .change-line,
    .age,
    .volume,
    .fdv{font-size:10px}
    .footer-links{font-size:10px}

<script>
  const themeSwitch=document.getElementById('themeSwitch');

  function applyTheme(mode){
    if(mode==='light'){
      document.documentElement.classList.add('theme-light');
      themeSwitch.setAttribute('aria-checked','true');
      themeSwitch.setAttribute('aria-label','Switch to dark theme');
    }else{
      document.documentElement.classList.remove('theme-light');
      themeSwitch.setAttribute('aria-checked','false');
      themeSwitch.setAttribute('aria-label','Switch to light theme');
    }
    localStorage.setItem('theme-mode',mode);
  }

  themeSwitch.addEventListener('click',()=>{
    const isLight=document.documentElement.classList.toggle('theme-light');
    applyTheme(isLight?'light':'dark');
    requestAnimationFrame(()=>{
      updateLayout();
      layoutTreemap();
    });
  });

  (function(){
    const saved=localStorage.getItem('theme-mode');
    applyTheme(saved==='light'?'light':'dark');
  })();

  const wrapEl = document.getElementById('wrap');
  const headerEl = document.getElementById('header');
  const topbarEl = document.getElementById('topbar');
  const contentEl = document.getElementById('content');
  const footerEl = document.getElementById('footer');
  const panelEl = document.getElementById('panel');

  function pxVar(name){
    return parseFloat(getComputedStyle(document.documentElement).getPropertyValue(name)) || 0;
  }

  function outerHeight(el){
    const cs = getComputedStyle(el);
    return el.offsetHeight + (parseFloat(cs.marginTop)||0) + (parseFloat(cs.marginBottom)||0);
  }

  function updateLayout(){
    const viewportH = window.innerHeight;
    const wrapStyle = getComputedStyle(wrapEl);

    const wrapPaddingTop = parseFloat(wrapStyle.paddingTop) || 0;
    const wrapPaddingBottom = parseFloat(wrapStyle.paddingBottom) || 0;

    const headerH = outerHeight(headerEl);
    const topbarH = outerHeight(topbarEl);
    const footerH = outerHeight(footerEl);

    const contentMarginTop = parseFloat(getComputedStyle(contentEl).marginTop) || 0;
    const panelFooterGap = pxVar('--panel-footer-gap');

    const panelHeight =
      viewportH
      - wrapPaddingTop
      - wrapPaddingBottom
      - headerH
      - topbarH
      - contentMarginTop
      - panelFooterGap
      - footerH;

    panelEl.style.setProperty('--panel-height', `${Math.max(220, Math.floor(panelHeight))}px`);
  }

  function isMobile(){
    return window.innerWidth <= 720;
  }

  function updateHeaderVisibility(){
    if(state.view!=='table'){
      document.getElementById('theadDesktop').style.display='none';
      document.getElementById('theadMobile').style.display='none';
      return;
    }
    document.getElementById('theadDesktop').style.display = isMobile() ? 'none' : 'grid';
    document.getElementById('theadMobile').style.display = isMobile() ? 'grid' : 'none';
  }

  let lastMobileLayout = isMobile();
  window.addEventListener('resize', ()=>{
    updateHeaderVisibility();
    const m = isMobile();
    if(m !== lastMobileLayout){
      lastMobileLayout = m;
      render();
    }
    updateLayout();
    scheduleLayoutTreemapOnResize();
  });

  window.addEventListener('load', updateLayout);

  if (window.ResizeObserver){
    const ro = new ResizeObserver(()=>updateLayout());
    ro.observe(headerEl);
    ro.observe(topbarEl);
    ro.observe(footerEl);
    const tw=document.getElementById('treemapWrap');
    if(tw) new ResizeObserver(()=>scheduleLayoutTreemapOnResize()).observe(tw);
  }

  const ICONS={
    clanker:"/images/clanker.jpg",
    doppler:"/images/doppler.jpg",
    virtual:"/images/virtual.jpg",
    aerodrome:"/images/aerodrome.jpg",
    flaunch:"/images/flaunch.jpg"
  };

  const WINDOWS = ['1h','6h','24h'];

  const state={
    category:'all',
    window:'24h',
    view:'table',
    rows:[],
    sort:{key:'volume',dir:'desc'}
  };

  const Treemap={
    LOGO_PLACEHOLDER:'/images/question.jpg',
    MERGE_FRAC:0.005,
    TEXT_MIN_SCALE:0.38,
    D3_SQUARIFY_RATIO:2.2,
    FIT_LINE_ITERS:38,
    FIT_FLEX_ITERS:36,
    FIT_NAME_TICKER_ITERS:42,
    FIT_MINI_ITERS:32,
    RESIZE_DEBOUNCE_MS:40,
    CANVAS_GRID:8,
    LAYOUT_PAD:8,
    LOGO_ATTR:'data-layout-logo',
    LOGO_MAX_PX:76,
    LOGO_MIN_PX:11,
    HEAT_RANGE:24,
  };

  function escHtml(s){
    return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const fmtUSD=(n)=> (n==null||isNaN(n)) ? '—'
    : (Math.abs(n)>=1e9?`$${(n/1e9).toFixed(1)}B`
    : Math.abs(n)>=1e6?`$${(n/1e6).toFixed(1)}M`
    : Math.abs(n)>=1e3?`$${(n/1e3).toFixed(1)}K`
    : `$${Number(n).toFixed(2)}`);

  function dexUrl(r){
    if(r.dex?.url) return r.dex.url;
    if(r.address) return `https://dexscreener.com/base/${r.address}`;
    return '#';
  }

  function mapRowForWin(r){
    const win=state.window;
    const price=r.dex?.price??null;
    const change=win==='1h'?r.dex?.chg1h:(win==='6h'?r.dex?.chg6h:r.dex?.chg24h);
    const volume=win==='1h'?r.dex?.vol1h:(win==='6h'?r.dex?.vol6h:r.dex?.vol24h);
    const fdv=r.dex?.fdv??null;
    return {...r,_price:price,_change:change,_volume:volume??0,_fdv:fdv};
  }

  function rowsForTreemap(){
    const filtered=state.rows.filter(r=>state.category==='all'?true:r.source===state.category);
    return filtered.map(mapRowForWin).filter(r=>r._fdv!=null&&r._fdv>0);
  }

  function buildTreemapNodes(){
    const items=rowsForTreemap();
    const total=items.reduce((s,r)=>s+r._fdv,0);
    if(total<=0) return [];
    const thr=total*Treemap.MERGE_FRAC;
    const big=[], small=[];
    for(const r of items){
      if(r._fdv>=thr) big.push(r);
      else small.push(r);
    }
    const wrapped=big.map(row=>({type:'t',row}));
    if(small.length){
      const sumFdv=small.reduce((s,r)=>s+r._fdv,0);
      const sumVol=small.reduce((s,r)=>s+(r._volume||0),0);
      let w=0, sumC=0;
      for(const r of small){
        const c=r._change;
        if(c!=null&&!isNaN(c)){
          sumC+=c*r._fdv;
          w+=r._fdv;
        }
      }
      const avgChg=w>0?sumC/w:null;
      wrapped.push({type:'o',fdv:sumFdv,vol:sumVol,chg:avgChg,count:small.length});
    }
    return wrapped;
  }

  function heatRgb(c0,c1,u){
    const t=Math.max(0,Math.min(1,u));
    return `rgb(${Math.round(c0[0]+(c1[0]-c0[0])*t)},${Math.round(c0[1]+(c1[1]-c0[1])*t)},${Math.round(c0[2]+(c1[2]-c0[2])*t)})`;
  }

  function heatInterp(x,stops){
    let i=0;
    while(i<stops.length-2&&x>stops[i+1][0]) i++;
    const [x0,c0]=stops[i];
    const [x1,c1]=stops[i+1];
    if(x1===x0) return heatRgb(c0,c1,0);
    const u=(x-x0)/(x1-x0);
    return heatRgb(c0,c1,u);
  }

  const TREEMAP_HEAT_UP=[
    [0,   [34, 88, 38]],
    [2.5, [28, 100, 42]],
    [5,   [24, 116, 48]],
    [8,   [20, 134, 54]],
    [11,  [17, 152, 62]],
    [14.5,[14, 170, 70]],
    [18,  [12, 188, 80]],
    [24,  [8,  208, 90]],
  ];
  const TREEMAP_HEAT_DN=[
    [-24, [232, 22, 36]],
    [-18, [210, 28, 38]],
    [-13, [186, 36, 42]],
    [-9,  [162, 44, 46]],
    [-6,  [138, 52, 50]],
    [-3.5,[118, 58, 54]],
    [-1.5,[100, 64, 58]],
    [0,   [82,  72, 62]],
  ];

  function heatColor(pct){
    if(pct==null||isNaN(pct)) return 'rgb(72,74,82)';
    const lim=Treemap.HEAT_RANGE;
    const x=Math.max(-lim,Math.min(lim,pct));
    if(x>0) return heatInterp(x,TREEMAP_HEAT_UP);
    if(x<0) return heatInterp(x,TREEMAP_HEAT_DN);
    return 'rgb(72,74,82)';
  }

  function tmChgClass(c){
    if(c==null||isNaN(c)) return 'tm-chg-flat';
    return c>=0?'tm-chg-up':'tm-chg-down';
  }

  function fmtTmChg(c){
    if(c==null||isNaN(c)) return '—';
    return `${c>0?'+':''}${Number(c).toFixed(2)}%`;
  }

  function fmtPrice(n){
    if(n==null || isNaN(n)) return '—';
    const v = Number(n);
    if (v >= 1000) return `$${v.toFixed(0)}`;
    if (v >= 1) return `$${v.toFixed(2)}`;
    if (v >= 0.01) return `$${v.toFixed(4)}`;
    return `$${v.toFixed(8)}`;
  }

  function showTreemapStatus(text,isErr){
    const el=document.getElementById('treemapStatus');
    const canvas=document.getElementById('treemapCanvas');
    if(!el||!canvas) return;
    if(!text){
      el.style.display='none';
      el.textContent='';
      canvas.style.display='';
      return;
    }
    el.style.display='block';
    el.textContent=text;
    el.className='treemap-status-msg'+(isErr?' err':'');
    canvas.style.display='none';
  }

  function shrinkTreemapLineToWidth(el,containerW,fs0){
    if(!el||fs0==null||isNaN(fs0)) return;
    let fs=parseFloat(el.style.fontSize);
    if(isNaN(fs)||fs<=0) fs=fs0;
    const base=fs;
    for(let j=0;j<Treemap.FIT_LINE_ITERS;j++){
      if(el.scrollWidth<=containerW+1) break;
      fs=Math.max(3,fs*0.88);
      el.style.fontSize=fs.toFixed(1)+'px';
      if(fs<=base*Treemap.TEXT_MIN_SCALE) break;
    }
  }

  function shrinkTreemapFlexRow(el){
    const fs0=parseFloat(el.style.fontSize);
    if(!fs0||isNaN(fs0)) return;
    let fs=fs0;
    for(let j=0;j<Treemap.FIT_FLEX_ITERS;j++){
      if(el.scrollWidth<=el.clientWidth+1) break;
      fs=Math.max(3,fs*0.88);
      el.style.fontSize=fs.toFixed(1)+'px';
      if(fs<=fs0*Treemap.TEXT_MIN_SCALE) break;
    }
  }

  function scaleTreemapNameTickerPair(nameEl,tickEl,maxInnerW){
    if(!nameEl&&!tickEl) return;
    const nameFs0=nameEl?parseFloat(nameEl.style.fontSize)||0:0;
    const tickFs0=tickEl?parseFloat(tickEl.style.fontSize)||0:0;
    let scale=1;
    for(let i=0;i<Treemap.FIT_NAME_TICKER_ITERS;i++){
      const nw=nameEl?nameEl.scrollWidth:0;
      const tw=tickEl?tickEl.scrollWidth:0;
      if(Math.max(nw,tw)<=maxInnerW) break;
      scale*=0.9;
      if(nameEl) nameEl.style.fontSize=Math.max(3,Math.round(nameFs0*scale*10)/10)+'px';
      if(tickEl) tickEl.style.fontSize=Math.max(3,Math.round(tickFs0*scale*10)/10)+'px';
      if(scale<Treemap.TEXT_MIN_SCALE) break;
    }
  }

  function fitTreemapStackOrFlexRow(el,stackClass,lineSelector,lineFsFallback){
    if(!el) return;
    const w=el.clientWidth+1;
    if(el.classList.contains(stackClass)){
      el.querySelectorAll(lineSelector).forEach(node=>{
        shrinkTreemapLineToWidth(node,w,parseFloat(node.style.fontSize)||parseFloat(el.style.fontSize)||lineFsFallback);
      });
    }else shrinkTreemapFlexRow(el);
  }

  function treemapLogoCapPx(cw,ch){
    const tall=ch>cw;
    const mq=Math.max(6,Math.round(Math.min(cw,ch)/6)*6);
    const u=Math.max(0,Math.min(1,(54-mq)/28));
    return Math.floor(Math.min(Treemap.LOGO_MAX_PX,
      cw*(tall?(0.60+0.06*u):(0.46+0.09*u)),
      mq*(0.52+0.08*u)));
  }

  function syncTreemapLogoSize(img,cellEl){
    if(!img) return;
    const cap=treemapLogoCapPx(cellEl.clientWidth,cellEl.clientHeight);
    const raw=cellEl.getAttribute(Treemap.LOGO_ATTR);
    const layoutPx=raw!=null&&raw!==''?parseInt(raw,10):NaN;
    const base=(!isNaN(layoutPx)&&layoutPx>0)?layoutPx:Treemap.LOGO_MIN_PX;
    let side=Math.max(Treemap.LOGO_MIN_PX,Math.min(cap,base));
    side=Math.round(side/2)*2;
    img.style.width=side+'px';
    img.style.height=side+'px';
  }

  function fitTreemapTokenCell(a){
    const img=a.querySelector('.tm-logo-side');
    if(img) syncTreemapLogoSize(img,a);
    const textCol=a.querySelector('.tm-textcol');
    const nameEl=textCol?.querySelector('.tm-name-side');
    const tickEl=textCol?.querySelector('.tm-ticker-side');
    if(textCol) scaleTreemapNameTickerPair(nameEl,tickEl,textCol.clientWidth+1);
    fitTreemapStackOrFlexRow(a.querySelector('.tm-pricechg'),'tm-pricechg--stack','.tm-price-line,.tm-chg-line',14);
    fitTreemapStackOrFlexRow(a.querySelector('.tm-subwrap'),'tm-subwrap--stack','.tm-sub-line',10);
  }

  function fitTreemapMiniCell(a){
    const tick=a.querySelector('.tm-stack > .tm-ticker-side');
    if(!tick) return;
    const fs0=parseFloat(tick.style.fontSize)||7;
    let fs=fs0;
    for(let i=0;i<Treemap.FIT_MINI_ITERS;i++){
      if(tick.scrollWidth<=a.clientWidth-2) break;
      fs=Math.max(3,fs*0.88);
      tick.style.fontSize=fs.toFixed(1)+'px';
      if(fs<=fs0*Treemap.TEXT_MIN_SCALE) break;
    }
  }

  function scheduleTreemapTextFit(canvas){

  let treemapLayoutRaf=null;

  function layoutTreemap(){
    if(state.view!=='treemap') return;

    },Treemap.RESIZE_DEBOUNCE_MS);

  function treemapTypeScale(minSide,area,cw,ch){
    const tallCell=ch>cw;
    const edgeRaw=Math.max(1,minSide);
    const edge=Math.max(6,Math.round(edgeRaw/6)*6);
    const sRaw=Math.sqrt(Math.max(1,area));
    const s=Math.max(6,Math.round(sRaw/6)*6);
    const cwU=Math.max(4,Math.round(cw/4)*4);
    const chU=Math.max(4,Math.round(ch/4)*4);
    const u=Math.max(0,Math.min(1,(58-edge)/26));
    const kLo=0.3+0.14*u;
    const baseDiv=4.72-0.35*u;
    const k=Math.max(kLo,Math.min(1,Math.min(edge/76,s/48)));
    const base=(s/baseDiv)*k;
    const ft=0.245+0.065*u;
    const fn=0.148+0.045*u;
    const fp=0.168+0.055*u;
    const fsMul=1.12+0.08*u;
    const fsTicker=Math.round(Math.max(4,Math.min(28,base*fsMul,edge*ft)));
    const fsName=Math.round(Math.max(4,Math.min(17,base*(0.52+0.045*u),edge*fn)));
    const fsPrice=Math.round(Math.max(4,Math.min(19,base*(0.68+0.065*u),edge*fp)));
    const shrink=Math.min(edge/70,s/48,1);
    const showName=edgeRaw>=20;
    const gapText=Math.max(1,Math.round(Math.min(fsName,fsTicker)*0.08));
    const lhName=1.18;
    const lhTicker=1.12;
    const textStackH=Math.round((showName?fsName*lhName+gapText:0)+fsTicker*lhTicker);
    const cwCap=cwU*(0.50+0.09*u);
    const edgeCap=edge*(0.43+0.11*u);
    const tallCap=tallCell
      ?Math.min(cwU*(0.58+0.055*u),chU*(0.38+0.055*u))
      :chU*(0.46+0.085*u);
    const capCell=Math.floor(Math.min(Treemap.LOGO_MAX_PX,cwCap,edgeCap,tallCap));
    const logoPx=Math.max(Treemap.LOGO_MIN_PX,Math.min(capCell,u>0.12
      ?Math.max(textStackH,Math.floor(capCell*0.82))
      :textStackH));
    const showLogo=edgeRaw>=28&&area>=720&&shrink>=0.36;
    const showSub=edgeRaw>=56&&area>=2600;
    const tight=edgeRaw<46;
    return{fsTicker,fsName,fsPrice,logoPx,showLogo,showName,showSub,shrink,tallCell,tight};
  }

  function treemapLeafScreenRect(leaf){
    return{x:leaf.y0,y:leaf.x0,cw:leaf.y1-leaf.y0,ch:leaf.x1-leaf.x0};
  }

  function applyTreemapCellGeometry(el,rect,bg){
    el.style.left=rect.x+'px';

  function treemapHierarchyValue(d){
    if(!d||d.children) return 0;
    if(d.type==='t') return Math.max(0,d.row._fdv||0);
    if(d.type==='o') return Math.max(0,d.fdv||0);
    return 0;
  }

  /** Lower FDV must not use larger ticker/name/price/logo than any higher-FDV cell that shows that layer. */
  function treemapClampTyMonotonicByFdv(leaves){
    leaves.sort((a,b)=>b.fdv-a.fdv);
    let capT=Infinity,capN=Infinity,capP=Infinity,capL=Infinity;
    for(const item of leaves){
      const r=item.rawTy;
      const d=item.d;
      const ty={...r};
      ty.fsTicker=Math.min(r.fsTicker,capT);
      capT=ty.fsTicker;

      const hasNameSide=d.type==='o'
        ?item.minSide>=30
        :(r.showName&&item.minSide>=18);
      if(hasNameSide){
        ty.fsName=Math.min(r.fsName,capN);
        capN=ty.fsName;
      }

      const showsPrice=d.type==='o'?item.minSide>=22:item.minSide>=18;
      if(showsPrice){
        ty.fsPrice=Math.min(r.fsPrice,capP);
        capP=ty.fsPrice;
      }

      if(r.showLogo){
        ty.logoPx=Math.min(r.logoPx,capL);
        capL=ty.logoPx;
      }
      item.ty=ty;
    }
  }

  function treemapApplyMonotonicClampPostFit(canvas){
    const sel='a.treemap-cell[data-tm-fdv], .treemap-cell.treemap-other[data-tm-fdv]';
    const nodes=[...canvas.querySelectorAll(sel)];
    if(nodes.length<=1) return;
    nodes.sort((a,b)=>(parseFloat(b.dataset.tmFdv)||0)-(parseFloat(a.dataset.tmFdv)||0));
    let capT=1e9,capN=1e9,capP=1e9,capL=1e9;
    for(const cell of nodes){
      const tick=cell.querySelector('.tm-ticker-side');
      if(tick){
        const fs=parseFloat(tick.style.fontSize);
        if(!isNaN(fs)){
          const v=Math.min(fs,capT);
          tick.style.fontSize=v.toFixed(1)+'px';
          capT=v;
        }
      }
      const name=cell.querySelector('.tm-name-side');
      if(name){
        const fs=parseFloat(name.style.fontSize);
        if(!isNaN(fs)){
          const v=Math.min(fs,capN);
          name.style.fontSize=v.toFixed(1)+'px';
          capN=v;
        }
      }
      const pch=cell.querySelector('.tm-pricechg');
      if(pch){
        if(pch.classList.contains('tm-pricechg--stack')){
          const pl=pch.querySelector('.tm-price-line');
          const cl=pch.querySelector('.tm-chg-line');
          const fsp=pl?parseFloat(pl.style.fontSize):NaN;
          const base=!isNaN(fsp)?fsp:(cl?parseFloat(cl.style.fontSize):NaN);
          if(!isNaN(base)){
            const v=Math.min(base,capP);
            if(pl) pl.style.fontSize=v.toFixed(1)+'px';
            if(cl) cl.style.fontSize=v.toFixed(1)+'px';
            capP=v;
          }
        }else{
          const fs=parseFloat(pch.style.fontSize);
          if(!isNaN(fs)){
            const v=Math.min(fs,capP);
            pch.style.fontSize=v.toFixed(1)+'px';
            capP=v;
          }
        }
      }
      const img=cell.querySelector('img.tm-logo-side');
      if(img){
        const s=parseFloat(img.style.width);
        if(!isNaN(s)&&s>0){
          let v=Math.min(s,capL);
          v=Math.round(v/2)*2;
          img.style.width=v+'px';
          img.style.height=v+'px';
          if(cell.hasAttribute(Treemap.LOGO_ATTR)) cell.setAttribute(Treemap.LOGO_ATTR,String(v));
          capL=v;
        }
      }
    }
  }

  function treemapReadCanvasSize(wrapEl){
    const g=Treemap.CANVAS_GRID;
    const p=Treemap.LAYOUT_PAD;
    const w=Math.max(200,Math.floor((wrapEl.clientWidth-p)/g)*g);
    const h=Math.max(260,Math.floor(Math.floor(wrapEl.clientHeight-p)/g)*g);
    return{w,h};
  }

  function treemapMountOtherCell(d,box,ty,minSide){
    const div=document.createElement('div');
    div.dataset.tmFdv=String(treemapHierarchyValue(d));
    div.className='treemap-cell treemap-other'+(ty.tight?' treemap-cell--tight':'');
    applyTreemapCellGeometry(div,box,heatColor(d.chg));
    if(minSide>=22){
      const subLine=treemapOtherSubHtml(ty,minSide,d.fdv,d.vol);
      const chgCls=tmChgClass(d.chg);
      div.innerHTML=`<div class="tm-stack${ty.tight?' tm-stack--tight':''}">
          <div class="tm-ticker-side" style="font-size:${ty.fsTicker}px">${escHtml('Other')}</div>
          ${minSide>=30?`<div class="tm-name-side" style="font-size:${ty.fsName}px">${escHtml(`${d.count} tokens`)}</div>`:''}
          ${treemapOtherChgHtml(ty.fsPrice,chgCls,fmtTmChg(d.chg))}
          ${subLine}
        </div>`;
    }else{
      div.innerHTML=`<div class="tm-stack"><div class="tm-ticker-side" style="font-size:${ty.fsTicker}px">${escHtml('Other')}</div></div>`;
    }
    return div;
  }

  function treemapMountTokenCell(d,box,ty,minSide){
    const r=d.row;
    if(!r) return null;
    const a=document.createElement('a');
    a.dataset.tmFdv=String(treemapHierarchyValue(d));
    a.className='treemap-cell'+(ty.tight?' treemap-cell--tight':'');
    a.href=dexUrl(r);
    a.target='_blank';
    a.rel='noopener noreferrer';
    applyTreemapCellGeometry(a,box,heatColor(r._change));
    const ticker=escHtml(r.dex?.baseSymbol||r.symbol||'—');
    const fullName=r.name||'';
    a.title=fullName||undefined;
    if(minSide<18){
      a.innerHTML=`<div class="tm-stack"><div class="tm-ticker-side" style="font-size:${ty.fsTicker}px">${ticker}</div></div>`;
      return a;
    }
    const tallCell=ty.tallCell;
    const topClass=['tm-toprow',tallCell?'tm-toprow--stack':'',ty.showLogo?'':'tm-toprow--solo'].filter(Boolean).join(' ');
    let topInner='';
    if(ty.showLogo) topInner+='<img class="tm-logo-side" alt="">';
    topInner+='<div class="tm-textcol">';
    if(ty.showName) topInner+=`<div class="tm-name-side" style="font-size:${ty.fsName}px">${escHtml(fullName||'—')}</div>`;
    topInner+=`<div class="tm-ticker-side" style="font-size:${ty.fsTicker}px">${ticker}</div>`;
    topInner+='</div>';
    const subFs=Math.max(4,Math.round(ty.fsName*0.88));
    const subLine=ty.showSub?treemapFdvVolSubHtml(tallCell,subFs,r._fdv,r._volume):'';
    const chgCls=tmChgClass(r._change);
    const priceHtml=treemapPriceChgHtml(tallCell,ty.fsPrice,fmtPrice(r._price),chgCls,fmtTmChg(r._change));
    a.innerHTML=`<div class="tm-stack${ty.tight?' tm-stack--tight':''}">
        <div class="${topClass}">${topInner}</div>
        ${priceHtml}
        ${subLine}
      </div>`;
    const im=a.querySelector('.tm-logo-side');
    if(im){
      a.setAttribute(Treemap.LOGO_ATTR,String(ty.logoPx));
      im.style.width=ty.logoPx+'px';
      im.style.height=ty.logoPx+'px';
      im.src=r.dex?.image||Treemap.LOGO_PLACEHOLDER;
      im.onerror=()=>{im.onerror=null;im.src=Treemap.LOGO_PLACEHOLDER;};
    }
    return a;
  }

  function runTreemapLayout(){
    const canvas=document.getElementById('treemapCanvas');
    const wrap=document.getElementById('treemapWrap');
    if(!canvas||!wrap||typeof d3==='undefined') return;

    canvas.innerHTML='';

    if(!state.rows.length){
      showTreemapStatus('Loading…',false);
      return;
    }

    const nodes=buildTreemapNodes();
    if(!nodes.length){
      showTreemapStatus('No valid FDV data in this category; cannot draw the treemap.',false);
      return;
    }
    showTreemapStatus('',false);

    const {w,h}=treemapReadCanvasSize(wrap);
    canvas.style.width=w+'px';
    canvas.style.height=h+'px';

    const root=d3.hierarchy({children:nodes},d=>d.children)
      .sum(treemapHierarchyValue)
      .sort((a,b)=>(b.value||0)-(a.value||0));

    d3.treemap()
      .tile(d3.treemapSquarify.ratio(Treemap.D3_SQUARIFY_RATIO))
      .size([h,w])
      .paddingOuter(2)
      .paddingInner(2)
      .round(true)
      (root);

    const leaves=[];
    for(const leaf of root.leaves()){
      const d=leaf.data;
      const box=treemapLeafScreenRect(leaf);
      const minSide=Math.min(box.cw,box.ch);
      const area=Math.max(1,box.cw*box.ch);
      const rawTy=treemapTypeScale(minSide,area,box.cw,box.ch);
      leaves.push({d,box,minSide,rawTy,fdv:treemapHierarchyValue(d)});
    }
    treemapClampTyMonotonicByFdv(leaves);
    for(const item of leaves){
      const {d,box,ty,minSide}=item;
      if(d.type==='o'){
        canvas.appendChild(treemapMountOtherCell(d,box,ty,minSide));
        continue;
      }
      const el=treemapMountTokenCell(d,box,ty,minSide);
      if(el) canvas.appendChild(el);
    }

    scheduleTreemapTextFit(canvas);
  }

  function daysFrom(ms){
    if(!ms) return '—';
    const d=Math.floor((Date.now()-Number(ms))/(1000*60*60*24));
    return `${d}d`;
  }

  function syncWindowUI(){
    document.querySelectorAll('#winChips .chip').forEach(chip=>{

  const chooseBestPair=(pairs=[])=>{
    if(!pairs.length) return null;

    const basePairs = pairs.filter(pair => {
      const url = pair.url || '';
      const network = (url.split('/')[3] || '').toLowerCase();
      return network === 'base';
    });

    if(basePairs.length > 0) {
      return [...basePairs].sort((a,b)=>{
        const la=a.liquidity?.usd??0, lb=b.liquidity?.usd??0;
        if(lb!==la) return lb-la;
        return (b.volume?.h24??0)-(a.volume?.h24??0);
      })[0];
    }

    return [...pairs].sort((a,b)=>{
      const la=a.liquidity?.usd??0, lb=b.liquidity?.usd??0;
      if(lb!==la) return lb-la;
      return (b.volume?.h24??0)-(a.volume?.h24??0);
    })[0];
  };

  async function fetchDex(address){
    const res=await fetch(`https://api.dexscreener.com/latest/dex/tokens/${address}`);
    if(!res.ok) return null;
    const data=await res.json();
    const p=chooseBestPair(data?.pairs);
    if(!p) return null;
    const url=p.url||'';
    const network=(url.split('/')[3]||'').toLowerCase();

    if(network !== 'base') return null;

    return {
      url,
      image:p.info?.imageUrl||'',
      price: Number(p.priceUsd)||null,
      chg1h: p.priceChange?.h1 ?? null,
      chg6h: p.priceChange?.h6 ?? null,
      chg24h: p.priceChange?.h24 ?? null,
      vol1h: p.volume?.h1 ?? null,
      vol6h: p.volume?.h6 ?? null,
      vol24h: p.volume?.h24 ?? null,
      fdv: p.fdv ?? null,
      createdAt: p.pairCreatedAt ?? null,
      baseSymbol: p.baseToken?.symbol || ''
    };
  }

  async function fetchDune(){
    const res=await fetch('/api/dune-data');
    if(!res.ok){
      let msg='Data request failed';
      try{ const j=await res.json(); if(j.error) msg=j.error; }catch{}
      throw new Error(msg);
    }
    const data=await res.json();
    const rows=data.rows;
    if(!Array.isArray(rows)||!rows.length) throw new Error(data.error||'No data available');
    return rows;
  }

  function computeView(){
    const filtered = state.rows.filter(r=> state.category==='all' ? true : r.source===state.category);
    const win=state.window;

    const mapped = filtered.map(r=>{
      const price = r.dex?.price ?? null;
      const change = win==='1h' ? r.dex?.chg1h : (win==='6h' ? r.dex?.chg6h : r.dex?.chg24h);
      const volume = win==='1h' ? r.dex?.vol1h : (win==='6h' ? r.dex?.vol6h : r.dex?.vol24h);
      const fdv = r.dex?.fdv ?? null;
      return {...r, _price:price, _change:change, _volume:volume??0, _fdv:fdv};
    });

    const {key:k,dir}=state.sort;
    const sign=dir==='asc'?1:-1;

    mapped.sort((a,b)=>{
      let av, bv;
      if(k === 'change'){
        av = a._change;
        bv = b._change;
      }else if(k === 'fdv'){
        av = a._fdv;
        bv = b._fdv;
      }else if(k === 'age'){
        const ta=a.dex?.createdAt, tb=b.dex?.createdAt;
        av = ta!=null && !isNaN(Number(ta)) ? Number(ta) : null;
        bv = tb!=null && !isNaN(Number(tb)) ? Number(tb) : null;
      }else{
        av = a._volume;
        bv = b._volume;
      }

      const avn=(av==null?(dir==='asc'?Number.POSITIVE_INFINITY:Number.NEGATIVE_INFINITY):av);
      const bvn=(bv==null?(dir==='asc'?Number.POSITIVE_INFINITY:Number.NEGATIVE_INFINITY):bv);
      return (avn-bvn)*sign;
    });

    return mapped.map((r,i)=>({...r,_rank:i+1}));
  }

  function updateSortIndicators(){
    const ids = [
      'arrow-change-desktop',
      'arrow-volume-desktop',
      'arrow-fdv-desktop',
      'arrow-age-desktop',
      'arrow-change-mobile',
      'arrow-volume-mobile',
      'arrow-fdv-mobile',
      'arrow-age-mobile'
    ];
    ids.forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.textContent='';
    });

    const suffixes = ['desktop','mobile'];
    suffixes.forEach(suffix=>{
      const target = document.getElementById(`arrow-${state.sort.key}-${suffix}`);
      if(target) target.textContent = state.sort.dir === 'asc' ? '▲' : '▼';
    });
  }

  async function copyToClipboard(text, btn){

      btn.classList.add('copied');

  }

  let dexLoadRenderTimer = null;
  function scheduleRenderWhileDexLoading(){
    if(dexLoadRenderTimer) clearTimeout(dexLoadRenderTimer);
    dexLoadRenderTimer = setTimeout(()=>{
      dexLoadRenderTimer = null;
      render();
    }, 120);
  }

  function flushDexLoadRender(){
    if(dexLoadRenderTimer){
      clearTimeout(dexLoadRenderTimer);
      dexLoadRenderTimer = null;

  function render(){
    updateHeaderVisibility();
    updateSortIndicators();
    syncWindowUI();

    if(state.view==='treemap'){
      updateLayout();
      layoutTreemap();
      requestAnimationFrame(updateLayout);
      return;
    }

    const wrap=document.getElementById('rows');
    wrap.innerHTML='';
    const rows=computeView();
    const mobile = isMobile();

    for(const r of rows){
      const chgClass = r._change==null ? '' : (r._change>=0?'positive':'negative');
      const fullName=r.name||'';
      const shortName=fullName.length>22?(fullName.slice(0,22)+'…'):fullName;

      const el=document.createElement('div');
      el.className=`row ${mobile ? 'mobile' : 'desktop'}`;

      if(mobile){
        el.innerHTML=`
          <div class="rank">#${r._rank}</div>
          <div class="token">
            <img class="logo"
                 src="${r.dex?.image || Treemap.LOGO_PLACEHOLDER}"
                 alt="token logo"
                 onerror="this.onerror=null;this.src='${Treemap.LOGO_PLACEHOLDER}'">
            <div class="tinfo">
              <div class="symbol-line">
                <a class="symbol link" href="${r.dex?.url||'#'}" target="_blank" rel="noopener">${r.dex?.baseSymbol || r.symbol || '—'}</a>
                ${r.source!=='all'?`<img class="cat-icon" src="${ICONS[r.source]||''}" alt="${r.source}">`:''}
              </div>
              <div class="subline">
                <div class="name-line">
                  <span class="name" title="${fullName.replace(/"/g,'&quot;')}">${shortName}</span>
                  <button class="ca-btn" title="Copy Contract Address">CA</button>
                </div>
              </div>
            </div>
          </div>

          <div class="price-change">
            <div class="price-line">${fmtPrice(r._price)}</div>
            <div class="change-line ${chgClass}">${(r._change!=null)?`${r._change>0?'+':''}${Number(r._change).toFixed(2)}%`:'—'}</div>
          </div>

          <div class="volume">${fmtUSD(r._volume)}</div>
          <div class="fdv">${fmtUSD(r._fdv)}</div>
          <div class="age">${r.dex?.createdAt ? daysFrom(r.dex.createdAt) : '—'}</div>
        `;
      } else {
        el.innerHTML=`
          <div class="rank">#${r._rank}</div>
          <div class="token">
            <img class="logo"
                 src="${r.dex?.image || Treemap.LOGO_PLACEHOLDER}"
                 alt="token logo"
                 onerror="this.onerror=null;this.src='${Treemap.LOGO_PLACEHOLDER}'">
            <div class="tinfo">
              <div class="symbol-line">
                <a class="symbol link" href="${r.dex?.url||'#'}" target="_blank" rel="noopener">${r.dex?.baseSymbol || r.symbol || '—'}</a>
                ${r.source!=='all'?`<img class="cat-icon" src="${ICONS[r.source]||''}" alt="${r.source}">`:''}
              </div>
              <div class="subline">
                <div class="name-line">
                  <span class="name" title="${fullName.replace(/"/g,'&quot;')}">${shortName}</span>
                  <button class="ca-btn" title="Copy Contract Address">CA</button>
                </div>
              </div>
            </div>
          </div>

          <div class="price">${fmtPrice(r._price)}</div>
          <div class="change ${chgClass}">${(r._change!=null)?`${r._change>0?'+':''}${Number(r._change).toFixed(2)}%`:'—'}</div>
          <div class="volume">${fmtUSD(r._volume)}</div>
          <div class="fdv">${fmtUSD(r._fdv)}</div>
          <div class="age">${r.dex?.createdAt ? daysFrom(r.dex.createdAt) : '—'}</div>
        `;
      }

      el.querySelector('.ca-btn').addEventListener('click',()=>copyToClipboard(r.address, el.querySelector('.ca-btn')));
      wrap.appendChild(el);
    }

    requestAnimationFrame(updateLayout);
  }

  document.addEventListener('click', e=>{
    const th=e.target.closest('.th-sort');
    if(!th) return;
    const key=th.dataset.sort;
    if(!key) return;

    if(state.sort.key===key){
      state.sort.dir=state.sort.dir==='asc'?'desc':'asc';
    }else{
      state.sort.key=key;
      state.sort.dir='desc';
    }
    render();
  });

  document.getElementById('catChips').addEventListener('click', e=>{
    const c=e.target.closest('.chip');
    if(!c) return;
    [...e.currentTarget.children].forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    state.category=c.dataset.cat;
    render();
  });

  document.getElementById('winChips').addEventListener('click', e=>{
    const c=e.target.closest('.chip');
    if(!c) return;
    state.window=c.dataset.win;
    state.sort={key:'volume',dir:'desc'};
    render();
  });

  document.getElementById('mobileWinCycle').addEventListener('click', ()=>{
    const idx = WINDOWS.indexOf(state.window);
    state.window = WINDOWS[(idx + 1) % WINDOWS.length];
    state.sort={key:'volume',dir:'desc'};
    render();
  });

  document.getElementById('viewToggle').addEventListener('click', ()=>{
    state.view = state.view==='table' ? 'treemap' : 'table';
    applyView();
  });

  (async function init(){
    try{
      updateHeaderVisibility();
      syncWindowUI();
      updateSortIndicators();

      const duneRows=await fetchDune();
      const concurrency=8, out=[]; let i=0;

      async function worker(){
        while(i<duneRows.length){
          const idx=i++;
          const r=duneRows[idx];
          try{
            out[idx] = {...r, dex: await fetchDex(r.address)};
          }catch{
            out[idx] = {...r, dex:null};
          }
          state.rows = out.filter(Boolean);
          scheduleRenderWhileDexLoading();
        }
      }

      await Promise.all(Array.from({length:concurrency}, worker));
      flushDexLoadRender();
      state.rows = out.filter(Boolean);
      render();
      updateLayout();
    }catch(e){
      console.error(e);
      const msg=`Load failed: ${e.message}`;
      document.getElementById('rows').innerHTML = `<div style="padding:18px;color:#fc401f">${msg}</div>`;
      const ts=document.getElementById('treemapStatus');
      if(ts){
        ts.style.display='block';
        ts.className='treemap-status-msg err';
        ts.textContent=msg;
      }
      updateLayout();
    }
  })();
</script>
</body>
</html>
